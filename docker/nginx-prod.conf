# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name barqawi-cars.de www.barqawi-cars.de;

    # Allow Let's Encrypt ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://barqawi-cars.de$request_uri;
    }
}

# ── Redirect www → non-www (HTTPS) ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name www.barqawi-cars.de;

    ssl_certificate     /etc/ssl/certs/fullchain.pem;
    ssl_certificate_key /etc/ssl/private/privkey.pem;

    return 301 https://barqawi-cars.de$request_uri;
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name barqawi-cars.de;
    root /var/www/html/public;
    index index.php;

    # ── SSL ────────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/certs/fullchain.pem;
    ssl_certificate_key /etc/ssl/private/privkey.pem;
    ssl_trusted_certificate /etc/ssl/certs/chain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "SAMEORIGIN"                                  always;
    add_header X-Content-Type-Options     "nosniff"                                     always;
    add_header X-XSS-Protection           "1; mode=block"                               always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"             always;
    add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()"   always;

    server_tokens off;

    # ── Gzip ───────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff
        font/woff2;

    # ── PHP-FPM ────────────────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass   app:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        fastcgi_buffer_size  128k;
        fastcgi_buffers      8 128k;
        fastcgi_read_timeout 120;

        # Forward real client IP
        fastcgi_param  HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param  HTTP_X_FORWARDED_PROTO $scheme;
    }

    # ── Main routing ───────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Immutable static assets (Vite fingerprinted) ──────────────────────────
    location ~* /build/.*\.(css|js|woff|woff2|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Other static assets ───────────────────────────────────────────────────
    location ~* \.(css|js|ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── Block dotfiles ─────────────────────────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ── Logging ────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;
}
